<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Chatbot</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>RAG Document Chatbot</h1>
            <p>Upload a document, then ask questions about it</p>
        </header>

        <div class="upload-area" id="upload-area">
            <input type="file" id="file-input" accept=".pdf,.txt" hidden />
            <button id="upload-btn">Upload PDF or TXT</button>
            <span id="upload-status"></span>
        </div>

        <div id="chat-messages" class="messages">
            <div class="message bot-message">
                <div class="message-content">
                    Hi! Upload a PDF or TXT file first, then ask me anything about it.
                </div>
            </div>
        </div>

        <div class="input-area">
            <select id ="language-select">
                <option value="English">English</option>
                <option value="Arabic">العربية</option>
                <option value="Japanese">日本語</option>
            </select>
            <input
                type="text"
                id="user-input"
                placeholder="Ask a question about your document..."
                autocomplete="off"
            />
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="/script.js"></script>
</body>
</html>
